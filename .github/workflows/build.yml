name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号（不加 v，留空仅构建）'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Download sherpa-onnx WASM
        run: |
          VERSION="1.13.4"
          TMPDIR=$(mktemp -d)
          curl -sL \
            "https://github.com/k2-fsa/sherpa-onnx/releases/download/v${VERSION}/sherpa-onnx-wasm-simd-v${VERSION}-zh-en-asr-zipformer.tar.bz2" \
            | tar xj -C "$TMPDIR"
          mkdir -p public/wasm
          find "$TMPDIR" -type f -exec mv {} public/wasm/ \;
          rm -rf "$TMPDIR"
          rm -f public/wasm/index.html public/wasm/app-asr.js
          ls -lh public/wasm/

      - name: Set release version
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: |
          V=${{ github.event.inputs.version }}
          sed -i "s/开发版本/v$V/g" src/popup.html src/i18n.ts
          sed -i "s/\"version\": \".*\"/\"version\": \"$V\"/" package.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$V\"/" manifest.json

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: extension${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version != '' && format('-v{0}', github.event.inputs.version) || '' }}
          path: dist/

  release:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-v${{ github.event.inputs.version }}
          path: dist

      - name: Package extension
        run: |
          cd dist
          zip -r ../easysub-v${{ github.event.inputs.version }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          body: |
            ## EasySub v${{ github.event.inputs.version }}

            Chrome → 扩展程序 → 加载已解压的扩展 → 选择解压后的目录
          files: easysub-v${{ github.event.inputs.version }}.zip
          draft: false
          prerelease: false
