name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号（不加 v，留空仅构建）'
        required: false
        type: string

env:
  VERSION_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Download sherpa-onnx WASM
        run: |
          VERSION="1.13.4"
          mkdir -p public/wasm
          curl -L \
            "https://github.com/k2-fsa/sherpa-onnx/releases/download/v${VERSION}/sherpa-onnx-wasm-simd-v${VERSION}-zh-en-asr-zipformer.tar.bz2" \
            | tar xj -C public/wasm --strip-components=1

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: extension${{ env.VERSION_TAG != '' && format('-v{0}', env.VERSION_TAG) || '' }}
          path: dist/

  release:
    if: env.VERSION_TAG != ''
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-v${{ env.VERSION_TAG }}
          path: dist

      - name: Package extension
        run: |
          cd dist
          zip -r ../easysub-v${{ env.VERSION_TAG }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_TAG }}
          name: v${{ env.VERSION_TAG }}
          body: |
            ## EasySub v${{ env.VERSION_TAG }}

            - 下载 [easysub-v${{ env.VERSION_TAG }}.zip]
            - Chrome → 扩展程序 → 加载已解压的扩展 → 选择解压后的目录
          files: easysub-v${{ env.VERSION_TAG }}.zip
          draft: false
          prerelease: false
