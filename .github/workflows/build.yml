name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Download sherpa-onnx WASM
        run: |
          VERSION="1.13.4"
          mkdir -p public/wasm
          curl -L \
            "https://github.com/k2-fsa/sherpa-onnx/releases/download/v${VERSION}/sherpa-onnx-wasm-simd-v${VERSION}-zh-en-asr-zipformer.tar.bz2" \
            | tar xj -C public/wasm --strip-components=1

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: dist/
