name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Download sherpa-onnx WASM
        run: |
          VERSION="1.13.4"
          mkdir -p public/wasm
          curl -L -o wasm.tar.bz2 \
            "https://github.com/k2-fsa/sherpa-onnx/releases/download/v${VERSION}/sherpa-onnx-wasm-simd-v${VERSION}-zh-en-asr-zipformer.tar.bz2"
          tar xjf wasm.tar.bz2 -C public/wasm --strip-components=1
          rm wasm.tar.bz2

      - name: Create preload.js
        run: |
          cat > public/wasm/preload.js << 'PRELOAD'
          var Module = {
            locateFile: function(path) {
              return chrome.runtime.getURL('wasm/' + path);
            },
            onRuntimeInitialized: function() {
              window.__wasmReady = true;
              window.__recognizer = createOnlineRecognizer(Module);
              console.log('[TM WASM] recognizer created');
            }
          };
          PRELOAD

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: dist/
