<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>易字幕 — 麦克风授权</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  font: 400 15px/1.5 system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  color: rgba(255,255,255,0.9);
  -webkit-font-smoothing: antialiased;
  padding: 20px;
}
.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 40px 36px 32px;
  max-width: 380px;
  width: 100%;
  text-align: center;
  box-shadow: 0 16px 64px rgba(0,0,0,0.5);
}
.icon {
  width: 48px; height: 48px; margin: 0 auto 20px;
  background: rgba(94,158,255,0.15);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.icon svg { width: 24px; height: 24px; color: #5e9eff; }
h1 { font-size: 18px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.01em; }
p { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 24px; line-height: 1.5; }
#status { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 24px; }
#status .ok { color: #34c759; }
#status .err { color: #ff3b30; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 28px; border: none; border-radius: 12px;
  background: #5e9eff; color: #fff;
  font: 500 15px/1 system-ui, sans-serif;
  cursor: pointer;
  transition: transform 120ms cubic-bezier(0.23,1,0.32,1), opacity 200ms cubic-bezier(0.23,1,0.32,1), background 200ms cubic-bezier(0.23,1,0.32,1);
  -webkit-font-smoothing: antialiased;
}
.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn:hover:not(:disabled) { background: #4a8aff; }
.btn svg { width: 16px; height: 16px; }
@media (prefers-reduced-motion: reduce) {
  .btn { transition: none; }
  .btn:active { transform: none; }
}
</style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <path d="M12 19v4"/>
      <path d="M8 23h8"/>
    </svg>
  </div>
  <h1>需要麦克风权限</h1>
  <p id="status">易字幕 需要麦克风访问权限才能进行语音识别</p>
  <button id="btnGrant" class="btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
    </svg>
    授权麦克风
  </button>
</div>
<script src="permission.js"></script>
</body>
</html>
